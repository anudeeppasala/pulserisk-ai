services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: python:3.12-slim
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    command: sh -c "pip install streamlit requests && streamlit run streamlit_app.py --server.address 0.0.0.0"
    depends_on:
      - backend
